name: Release

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/scripts/**"
      - ".github/workflows/release.yml"
      - "apps/**"
      - "crates/**"
      - "Cargo.lock"
      - "Cargo.toml"
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: Version used in artifact names (for example, 0.1.0)
        required: true
        default: 0.1.0

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || startsWith(github.ref, 'refs/tags/') && github.ref_name || format('0.0.0-pr{0}', github.event.number) }}

jobs:
  windows:
    name: Windows x86_64
    runs-on: windows-2025
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Install Rust
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Test workspace
        run: cargo test --workspace --locked
      - name: Package Windows release
        shell: pwsh
        run: .github/scripts/package-windows.ps1 -Version "$env:RELEASE_VERSION"
      - name: Upload Windows package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: windows-x86_64
          path: dist/*.zip
          if-no-files-found: error

  macos:
    name: macOS universal
    runs-on: macos-15
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Install Rust targets
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add aarch64-apple-darwin x86_64-apple-darwin
      - name: Test workspace
        run: cargo test --workspace --locked
      - name: Package universal macOS release
        run: .github/scripts/package-macos.sh "$RELEASE_VERSION"
      - name: Upload macOS package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: macos-universal
          path: dist/*.dmg
          if-no-files-found: error

  linux:
    name: Linux x86_64
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes libgl1-mesa-dev libwayland-dev libx11-dev libxcursor-dev libxi-dev libxkbcommon-dev libxkbcommon-x11-dev libxrandr-dev
      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Test workspace
        run: cargo test --workspace --locked
      - name: Package Linux release
        run: .github/scripts/package-linux.sh "$RELEASE_VERSION"
      - name: Upload Linux packages
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: linux-x86_64
          path: |
            dist/*.tar.gz
            dist/*.deb
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows, macos, linux]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download packages
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          path: dist
          merge-multiple: true
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --verify-tag --generate-notes --title "RustyNTRViewer $GITHUB_REF_NAME"

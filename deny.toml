[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
    "x86_64-pc-windows-msvc",
]

[licenses]
confidence-threshold = 0.93
unused-allowed-license = "allow"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Unicode-3.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Zlib",
    "ISC",
    "BSL-1.0",
    "CC0-1.0",
    "0BSD",
    "Unlicense",
    "OFL-1.1",
    "Ubuntu-font-1.0",
]

[licenses.private]
ignore = true
